{% macro person_card(name, missing_since, age_now, last_seen, photo_url, aged_url, detail_url="#") %}
<div class="rounded-2xl bg-black/60 p-3 border border-white/10 overflow-hidden flex flex-col">

  <!-- Before / After slider -->
  <div
    x-data="{ pos: 50, dragging: false }"
    @mousedown.prevent="dragging = true"
    @mouseup.window="dragging = false"
    @mousemove.window="if (dragging) {
      let r = $el.getBoundingClientRect();
      pos = Math.min(97, Math.max(3, (($event.clientX - r.left) / r.width) * 100));
    }"
    @touchstart.prevent="dragging = true"
    @touchend.window="dragging = false"
    @touchmove.window.prevent="if (dragging) {
      let r = $el.getBoundingClientRect();
      pos = Math.min(97, Math.max(3, (($event.touches[0].clientX - r.left) / r.width) * 100));
    }"
    class="relative select-none overflow-hidden rounded-xl aspect-[4/5] cursor-ew-resize"
  >
    <!-- Aged photo (background) -->
    <img src="{{ aged_url }}" class="absolute inset-0 w-full h-full object-cover" />

    <!-- Original photo (clipped left) -->
    <div class="absolute inset-0 overflow-hidden" :style="`width: ${pos}%`">
      <img src="{{ photo_url }}" class="absolute inset-0 h-full object-cover" style="min-width: 100%" />
    </div>

    <!-- Divider -->
    <div
      class="absolute top-0 bottom-0 w-[2px] bg-white/70 pointer-events-none"
      :style="`left: calc(${pos}% - 1px)`"
    >
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2
                  w-6 h-6 bg-white rounded-full shadow-lg
                  flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 9l-4 3 4 3M16 9l4 3-4 3"/>
        </svg>
      </div>
    </div>

    <!-- Labels -->
    <div class="absolute top-2 left-2 text-[10px] text-white bg-black/60 rounded-full px-2 py-0.5 pointer-events-none">Then</div>
    <div class="absolute top-2 right-2 text-[10px] text-white bg-black/60 rounded-full px-2 py-0.5 pointer-events-none">Now</div>
  </div>

  <!-- Info -->
  <div class="flex flex-col gap-1 px-2 pt-3 pb-2">
    <p class="text-xs text-white/40">Missing since {{ missing_since }} · Age ~{{ age_now }} now</p>
    <h2 class="text-lg font-semibold text-white">{{ name }}</h2>
    <p class="text-sm text-white/50">Last seen in {{ last_seen }}</p>
  </div>

  <!-- Actions -->
  <div class="flex items-center justify-between px-2 py-2 mt-auto border-t border-white/5">
    <a href="{{ detail_url }}"
       class="text-sm text-white/35 hover:text-white/70 transition-colors duration-200">
      View Detail
    </a>
    <button class="flex items-center gap-2 text-sm text-white font-medium
                   hover:text-white/70 transition-colors duration-200">
      <span>👋</span> I've Seen This Person
    </button>
  </div>

</div>
{% endmacro %}
